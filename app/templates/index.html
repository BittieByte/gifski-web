<!DOCTYPE html>
<html lang="en" x-data="app()" x-cloak>
<head>
  <meta charset="UTF-8">
  <title>Gifski Web Optimizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-2xl bg-gray-800 rounded-3xl shadow-2xl p-8"
     @dragover.prevent="dragging = true"
     @dragleave.prevent="dragging = false"
     @drop.prevent="handleDrop($event)"
     :class="{'ring-4 ring-green-400': dragging}">

  <h2 class="text-3xl font-bold text-green-400 text-center mb-6">Gifski Web Optimizer</h2>

  <!-- Drop Zone -->
  <div class="border-4 border-dashed border-gray-600 rounded-xl p-12 text-center cursor-pointer hover:border-green-400 transition"
       @click="$refs.file.click()">
    <p class="text-gray-400" x-text="fileName || 'Drag & Drop a file here or click to select'"></p>
  </div>

  <form action="/upload" method="POST" enctype="multipart/form-data" class="mt-6 space-y-4" @submit="loading = true">
    <input type="file" name="file" x-ref="file" @change="fileSelected" class="hidden" required>

    <!-- Basic Options -->
    <div class="grid grid-cols-2 gap-4">

      <!-- Quality -->
      <div>
        <label class="flex items-center gap-2">
          Quality
          <span class="text-gray-400 cursor-help" title="Controls overall image quality (higher = better, larger file)">ⓘ</span>
        </label>
        <input type="number" name="quality" value="90" min="1" max="100"
               class="w-full p-2 rounded-lg bg-gray-700 focus:ring-2 focus:ring-green-400">
        <p class="text-xs text-gray-400 mt-1">Recommended: 80–95 for best balance</p>
      </div>

      <!-- FPS -->
      <div>
        <label class="flex items-center gap-2">
          FPS
          <span title="Frames per second. Lower = smaller file, choppier animation" class="text-gray-400 cursor-help">ⓘ</span>
        </label>
        <input type="number" name="fps"
               class="w-full p-2 rounded-lg bg-gray-700 focus:ring-2 focus:ring-green-400">
        <p class="text-xs text-gray-400 mt-1">Lower this to reduce size significantly</p>
      </div>

      <!-- Width -->
      <div>
        <label class="flex items-center gap-2">
          Width
          <span title="Resize output width in pixels" class="text-gray-400 cursor-help">ⓘ</span>
        </label>
        <input type="number" name="width"
               class="w-full p-2 rounded-lg bg-gray-700 focus:ring-2 focus:ring-green-400">
      </div>

      <!-- Height -->
      <div>
        <label class="flex items-center gap-2">
          Height
          <span title="Resize output height in pixels" class="text-gray-400 cursor-help">ⓘ</span>
        </label>
        <input type="number" name="height"
               class="w-full p-2 rounded-lg bg-gray-700 focus:ring-2 focus:ring-green-400">
      </div>
    </div>

    <!-- Modifiers -->
    <div class="flex flex-col gap-2 text-sm">
      <label class="flex items-center gap-2">
        <input type="checkbox" name="fast">
        Fast
        <span title="Speeds up encoding (~2x) but slightly reduces quality" class="text-gray-400 cursor-help">ⓘ</span>
      </label>

      <label class="flex items-center gap-2">
        <input type="checkbox" name="extra">
        Extra Quality
        <span title="Slower encoding but improves quality" class="text-gray-400 cursor-help">ⓘ</span>
      </label>
    </div>

    <!-- Advanced Toggle -->
    <button type="button" @click="showAdvanced = !showAdvanced"
            class="w-full py-2 bg-green-500 rounded-lg font-bold hover:bg-green-600 transition">
      Advanced Options
    </button>

    <!-- Advanced -->
    <div x-show="showAdvanced" x-transition class="space-y-4">

      <div>
        <label class="flex items-center gap-2">
          Motion Quality
          <span title="How well motion is preserved between frames" class="text-gray-400 cursor-help">ⓘ</span>
        </label>
        <input type="number" name="motion_quality"
               class="w-full p-2 rounded-lg bg-gray-700">
      </div>

      <div>
        <label class="flex items-center gap-2">
          Lossy Quality
          <span title="Allows compression artifacts for smaller file size" class="text-gray-400 cursor-help">ⓘ</span>
        </label>
        <input type="number" name="lossy_quality"
               class="w-full p-2 rounded-lg bg-gray-700">
      </div>

      <div>
        <label class="flex items-center gap-2">
          Repeat
          <span title="-1 = no loop, 0 = infinite loop" class="text-gray-400 cursor-help">ⓘ</span>
        </label>
        <input type="number" name="repeat"
               class="w-full p-2 rounded-lg bg-gray-700">
      </div>

      <div>
        <label>Fixed Color</label>
        <input type="text" name="fixed_color" placeholder="#RRGGBB"
               class="w-full p-2 rounded-lg bg-gray-700">
      </div>

      <div>
        <label>Matte Color</label>
        <input type="text" name="matte" placeholder="#RRGGBB"
               class="w-full p-2 rounded-lg bg-gray-700">
      </div>

      <label class="flex items-center gap-2">
        <input type="checkbox" name="no_sort">
        No Sort
        <span title="Keeps frame order exactly as provided" class="text-gray-400 cursor-help">ⓘ</span>
      </label>

    </div>

    <button type="submit"
            class="w-full py-3 bg-green-500 rounded-xl font-bold hover:bg-green-600 transition">
      Optimize
    </button>
  </form>
</div>

<!-- Loader -->
<div x-show="loading" class="fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="w-16 h-16 border-4 border-gray-700 border-t-green-400 rounded-full animate-spin"></div>
</div>

<script>
function app() {
  return {
    fileName: '',
    dragging: false,
    loading: false,
    showAdvanced: false,
    fileSelected(e) {
      this.fileName = e.target.files[0]?.name || '';
    },
    handleDrop(e) {
      this.dragging = false;
      this.$refs.file.files = e.dataTransfer.files;
      this.fileName = e.dataTransfer.files[0]?.name || '';
    }
  }
}
</script>

</body>
</html>
