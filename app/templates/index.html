<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gifski Web Optimizer</title>
<style>
  /* Reset and body */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e8edf3;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  /* Drag-and-drop box */
  .drop-zone {
    border: 3px dashed #4CAF50;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #666;
    margin-bottom: 20px;
    transition: background 0.3s, border-color 0.3s;
    cursor: pointer;
  }
  .drop-zone.dragover {
    background: #f0fff0;
    border-color: #45a049;
    color: #333;
  }

  /* Inputs */
  input[type=file] {
    display: none;
  }

  .form-group {
    margin-bottom: 12px;
  }
  label {
    display: block;
    margin-bottom: 4px;
  }
  input[type=number], input[type=text] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  input[type=checkbox] {
    margin-right: 6px;
  }

  /* Submit button */
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
  }
  button:hover {
    background: #45a049;
  }

  /* Loading overlay */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(2px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .loading-overlay.show {
    display: flex;
  }
  .spinner {
    border: 6px solid #f3f3f3;
    border-top: 6px solid #4CAF50;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
  }
</style>
</head>
<body>

<div class="container">
  <h2>Upload GIF/Video to Optimize</h2>

  <div class="drop-zone" id="drop-zone">
    Drag & Drop your file here or click to select
  </div>

  <form id="upload-form" action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" id="file-input" required>

    <!-- Basic Options -->
    <div class="form-group">
      <label>Quality (1-100)</label>
      <input type="number" name="quality" value="90" min="1" max="100">
    </div>
    <div class="form-group">
      <label>FPS</label>
      <input type="number" name="fps">
    </div>
    <div class="form-group">
      <label>Width (px)</label>
      <input type="number" name="width">
    </div>
    <div class="form-group">
      <label>Height (px)</label>
      <input type="number" name="height">
    </div>

    <!-- Encoding Modifiers -->
    <div class="form-group">
      <label><input type="checkbox" name="fast"> Fast (50% faster, lower quality)</label>
      <label><input type="checkbox" name="extra"> Extra (slower, better quality)</label>
    </div>

    <!-- Advanced Options -->
    <div class="form-group">
      <label>Motion Quality (1-100)</label>
      <input type="number" name="motion_quality">
    </div>
    <div class="form-group">
      <label>Lossy Quality (1-100)</label>
      <input type="number" name="lossy_quality">
    </div>
    <div class="form-group">
      <label>Repeat (-1 none, 0 forever)</label>
      <input type="number" name="repeat">
    </div>
    <div class="form-group">
      <label>Fixed Color (#RRGGBB)</label>
      <input type="text" name="fixed_color">
    </div>
    <div class="form-group">
      <label>Matte Color (#RRGGBB)</label>
      <input type="text" name="matte">
    </div>
    <div class="form-group">
      <label><input type="checkbox" name="no_sort"> No Sort (use files in exact order)</label>
    </div>

    <button type="submit">Optimize</button>
  </form>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const form = document.getElementById('upload-form');
const overlay = document.getElementById('loading-overlay');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', e => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    fileInput.files = e.dataTransfer.files;
  }
});

// Show loading overlay when submitting
form.addEventListener('submit', () => {
  overlay.classList.add('show');
});
</script>

</body>
</html>
