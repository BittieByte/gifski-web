<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gifski Web Optimizer</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; padding: 40px; }
.container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.1);}
h2 { text-align: center; }
input[type=file] { width: 100%; }
input[type=number], input[type=submit] { width: 100%; padding: 8px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; }
input[type=submit] { background: #4CAF50; color: white; border: none; cursor: pointer; }
input[type=submit]:hover { background: #45a049; }
</style>
</head>
<body>
<div class="container">
<h2>Upload GIF/Video to Optimize</h2>
<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required><br>

    <!-- Basic options -->
    Quality (1-100): <input type="number" name="quality" value="90" min="1" max="100"><br>
    FPS: <input type="number" name="fps"><br>
    Width: <input type="number" name="width"><br>
    Height: <input type="number" name="height"><br>

    <!-- Encoding modifiers -->
    <label><input type="checkbox" name="fast"> Fast (50% faster, lower quality)</label><br>
    <label><input type="checkbox" name="extra"> Extra (slower, better quality)</label><br>

    <!-- Advanced options -->
    Motion Quality (1-100): <input type="number" name="motion_quality"><br>
    Lossy Quality (1-100): <input type="number" name="lossy_quality"><br>
    Repeat (-1 none, 0 forever): <input type="number" name="repeat"><br>
    Fixed Color (#RRGGBB): <input type="text" name="fixed_color"><br>
    Matte Color (#RRGGBB): <input type="text" name="matte"><br>
    <label><input type="checkbox" name="no_sort"> No Sort (use files in exact order)</label><br>

    <input type="submit" value="Optimize">
</form>
</div>
</body>
</html>
