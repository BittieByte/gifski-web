<!DOCTYPE html>
<html lang="en" x-data="{ copying: false }" x-cloak>
<head>
  <meta charset="UTF-8">
  <title>Gifski Optimization Result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-gray-800 rounded-3xl shadow-2xl p-8 space-y-6">

  <h2 class="text-3xl font-bold text-green-400 text-center">GIF Optimization Result</h2>

  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
    <div class="bg-gray-700 rounded-xl p-4">
      <p class="text-gray-400 text-sm">Original Size</p>
      <p class="text-xl font-bold">{{ orig_size }}</p>
    </div>
    <div class="bg-gray-700 rounded-xl p-4">
      <p class="text-gray-400 text-sm">Optimized Size</p>
      <p class="text-xl font-bold">{{ new_size }}</p>
    </div>
    <div class="bg-gray-700 rounded-xl p-4">
      <p class="text-gray-400 text-sm">Reduction</p>
      <p class="text-xl font-bold text-green-400">{{ reduction }}%</p>
    </div>
  </div>

  <!-- GIF Preview -->
  <div class="flex justify-center">
    <img src="{{ gif_url }}" alt="Optimized GIF" class="rounded-xl max-w-full shadow-lg border border-gray-600">
  </div>

  <!-- Action Buttons -->
  <div class="flex flex-col sm:flex-row justify-center gap-4 mt-4">
    <a href="{{ gif_url }}" download
       class="flex-1 text-center py-3 bg-green-500 rounded-xl font-bold hover:bg-green-600 transition">
      Download GIF
    </a>
    <a href="/" 
       class="flex-1 text-center py-3 bg-gray-700 rounded-xl font-bold hover:bg-gray-600 transition">
      Optimize Another
    </a>
  </div>

  <!-- Optional: copy URL -->
  <div class="flex justify-center mt-2">
    <input type="text" value="{{ gif_url }}" readonly
           class="bg-gray-700 text-gray-100 rounded-l-xl p-2 w-3/4 focus:outline-none">
    <button @click="navigator.clipboard.writeText('{{ gif_url }}'); copying=true; setTimeout(()=>copying=false,1000)"
            class="bg-green-500 p-2 rounded-r-xl hover:bg-green-600 transition">
      <span x-text="copying ? 'Copied!' : 'Copy URL'"></span>
    </button>
  </div>

</div>

</body>
</html>
