<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Optimized GIF Result</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e8edf3;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
    font-weight: bold;
  }

  img {
    max-width: 100%;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  a.button {
    display: inline-block;
    margin: 5px;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    background: #4CAF50;
    color: white;
    font-weight: bold;
    transition: background 0.3s;
  }

  a.button:hover {
    background: #45a049;
  }

  /* Loading overlay (optional if doing AJAX) */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(2px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .loading-overlay.show {
    display: flex;
  }
  .spinner {
    border: 6px solid #f3f3f3;
    border-top: 6px solid #4CAF50;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
  }
</style>
</head>
<body>

<div class="container">
  <h2>GIF Optimization Result</h2>

  <div class="stats">
    <div>Original: {{ orig_size }} KB</div>
    <div>Optimized: {{ new_size }} KB</div>
    <div>Reduction: {{ reduction }}%</div>
  </div>

  <img src="{{ gif_url }}" alt="Optimized GIF">

  <div>
    <a href="{{ gif_url }}" download class="button">Download GIF</a>
    <a href="/" class="button">Upload Another</a>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
  // Optional: Show spinner while GIF loads
  const img = document.querySelector('img');
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('show');
  img.onload = () => {
    overlay.classList.remove('show');
  };
</script>

</body>
</html>
